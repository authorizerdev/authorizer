version: v2
managed:
  enabled: true
  # Don't rewrite go_package for third-party modules — they publish their own
  # pre-built Go SDKs on BSR; rewriting breaks imports.
  disable:
    - module: buf.build/bufbuild/protovalidate
      file_option: go_package_prefix
  override:
    - file_option: go_package_prefix
      value: github.com/authorizerdev/authorizer/gen/go
plugins:
  - remote: buf.build/protocolbuffers/go:v1.35.2
    out: ../gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: ../gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
