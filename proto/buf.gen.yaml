version: v2
managed:
  enabled: true
  # Don't rewrite go_package for third-party modules — they publish their own
  # pre-built Go SDKs on BSR; rewriting breaks imports.
  disable:
    - module: buf.build/bufbuild/protovalidate
      file_option: go_package_prefix
    - module: buf.build/googleapis/googleapis
      file_option: go_package_prefix
  override:
    - file_option: go_package_prefix
      value: github.com/authorizerdev/authorizer/gen/go
plugins:
  - remote: buf.build/protocolbuffers/go:v1.35.2
    out: ../gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: ../gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - remote: buf.build/grpc-ecosystem/gateway:v2.23.0
    out: ../gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=false
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.23.0
    out: ../gen/openapi
    opt:
      - allow_merge=true
      - merge_file_name=authorizer
      - json_names_for_fields=false
