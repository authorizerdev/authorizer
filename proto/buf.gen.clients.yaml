# Client SDK stub generation (separate from server codegen in buf.gen.yaml).
# Go and Python stubs are NO LONGER generated here — they now live in dedicated,
# BSR-driven packages consumed as real versioned dependencies:
#   Go     -> github.com/authorizerdev/authorizer-proto-go
#   Python -> authorizer-proto (PyPI) / authorizerdev/authorizer-proto-python
# Both regenerate themselves straight from buf.build/authorizerdev/authorizer,
# so there is no cross-repo copy step to keep in sync here anymore.
#
# Only the TypeScript message types remain vendored (authorizer-js speaks
# graphql/rest, not gRPC, and its REST/GraphQL surfaces are snake_case, so it
# keeps hand-typed transport but reuses these generated message shapes):
#   TS -> gen/ts   (vendored into authorizer-js)
# Run from proto/: buf generate --template buf.gen.clients.yaml --include-imports
version: v2
plugins:
  - remote: buf.build/bufbuild/es:v2.2.3
    out: ../gen/ts
    opt:
      - target=ts
      - import_extension=js
