version: v2
modules:
  - path: .
    name: buf.build/authorizerdev/authorizer
deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    # The single public service is intentionally named "Authorizer" rather
    # than "AuthorizerService" — it's THE authorizer, not "one of many
    # services." Matches the project name; users see a single typed client
    # in every SDK (authorizerv1.AuthorizerClient).
    - SERVICE_SUFFIX
  ignore: []
breaking:
  use:
    - FILE
