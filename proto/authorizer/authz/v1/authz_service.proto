syntax = "proto3";

package authorizer.authz.v1;

import "google/api/annotations.proto";
import "authorizer/common/v1/annotations.proto";

// AuthzService is the user-facing fine-grained-authorization surface. The
// admin CRUD on resources/scopes/policies/permissions remains GraphQL-only
// (dashboard consumer).
service AuthzService {
  // ListMyPermissions returns every (resource, scope) pair the caller is
  // allowed to act on, derived from their roles and the policy engine.
  rpc ListMyPermissions(ListMyPermissionsRequest) returns (ListMyPermissionsResponse) {
    option (google.api.http) = {get: "/v1/users/me/permissions"};
    option (authorizer.common.v1.mcp_tool) = {exposed: true};
  }
}

message ListMyPermissionsRequest {}

message ListMyPermissionsResponse {
  repeated Permission permissions = 1;
}

message Permission {
  string resource = 1;
  string scope = 2;
}
