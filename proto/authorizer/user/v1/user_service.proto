syntax = "proto3";

package authorizer.user.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "authorizer/common/v1/annotations.proto";
import "authorizer/common/v1/types.proto";
import "authorizer/user/v1/user.proto";

// UserService manages the User resource. Self vs admin is expressed via the
// resource-name pattern: "users/me" refers to the caller; "users/{id}"
// refers to any user (admin-only paths). On this v1 surface only "users/me"
// is exposed — admin operations live on GraphQL.
service UserService {
  // CreateUser registers a new user account. Public — requires sign-up
  // enabled in server config. On success returns tokens and (for browser
  // callers) Set-Cookie headers.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
    option (authorizer.common.v1.audit_log) = true;
    option (authorizer.common.v1.mcp_tool) = {exposed: false};  // creds
  }

  // GetUser returns a single user. On this surface, only name="users/me" is
  // accepted; admin reads remain on GraphQL.
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {get: "/v1/users/me"};
    option (authorizer.common.v1.mcp_tool) = {exposed: true};
  }

  // UpdateUser patches a user. On this surface, only name="users/me" is
  // accepted. The optional field_mask controls which fields are updated.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      patch: "/v1/users/me"
      body: "user"
    };
    option (authorizer.common.v1.audit_log) = true;
  }

  // DeleteUser deactivates the caller's account (soft delete). All of the
  // user's refresh tokens are revoked as a side effect. OAuth has no
  // standard concept of account deactivation — this method is the typed
  // equivalent of SCIM `PATCH /Users/{id} {active:false}`.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {delete: "/v1/users/me"};
    option (authorizer.common.v1.audit_log) = true;
    option (authorizer.common.v1.mcp_tool) = {
      exposed: false
      destructive: true
    };
  }
}

message CreateUserRequest {
  // Email or phone_number must be set (validated at the handler).
  string email = 1 [(buf.validate.field).string = {email: true, max_len: 320}];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string password = 3 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string confirm_password = 4 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  string gender = 9;
  string birthdate = 10;
  string picture = 11;
  repeated string roles = 12;
  repeated string scope = 13;
  string redirect_uri = 14;
  bool is_multi_factor_auth_enabled = 15;
  // OAuth2 authorization-code flow state echoed back via c_hash.
  string state = 16;
  authorizer.common.v1.AppData app_data = 17;
}

message CreateUserResponse {
  // Human-readable message describing the outcome (e.g. "Verification email
  // sent" vs "Signed up successfully").
  string message = 1;
  bool should_show_email_otp_screen = 2;
  bool should_show_mobile_otp_screen = 3;
  bool should_show_totp_screen = 4;
  string access_token = 5;
  string id_token = 6;
  string refresh_token = 7;
  int64 expires_in = 8;
  User user = 9;
}

message GetUserRequest {
  // Must be "users/me" on this v1 surface.
  string name = 1 [(buf.validate.field).string.pattern = "^users/(me|[A-Za-z0-9_-]+)$"];
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  // The user to update. user.id should be "users/me" or omitted.
  User user = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2;
  // Optional credential change. Validated cross-field by the handler.
  string old_password = 3;
  string new_password = 4;
  string confirm_new_password = 5;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  // Must be "users/me" on this v1 surface.
  string name = 1 [(buf.validate.field).string.pattern = "^users/(me|[A-Za-z0-9_-]+)$"];
}

message DeleteUserResponse {}
