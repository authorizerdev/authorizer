syntax = "proto3";

package authorizer.verification.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "authorizer/common/v1/annotations.proto";
import "authorizer/session/v1/session.proto";

// Note: this file imports authorizer.session.v1.Session only because
// successful email confirmation can issue a new session in self-sign-up
// flows. Future evolution may move the session-issuance side effect to a
// separate RPC to keep verification semantics clean.

// EmailVerificationService models the email-verification challenge as a
// resource. Create dispatches (or re-dispatches) a verification email;
// Confirm completes the verification with the token from the email link.
service EmailVerificationService {
  // CreateEmailVerification (re)sends the verification email for an
  // unverified address. Returns 201; idempotent within a short window.
  rpc CreateEmailVerification(CreateEmailVerificationRequest) returns (CreateEmailVerificationResponse) {
    option (google.api.http) = {
      post: "/v1/email-verifications"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
  }

  // ConfirmEmailVerification marks the verification complete. Returns a
  // Session when the original signup was a self-sign-up flow (so the user
  // is logged in immediately); otherwise returns the empty Session.
  rpc ConfirmEmailVerification(ConfirmEmailVerificationRequest) returns (ConfirmEmailVerificationResponse) {
    option (google.api.http) = {
      put: "/v1/email-verifications/{token}"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
    option (authorizer.common.v1.audit_log) = true;
  }
}

message CreateEmailVerificationRequest {
  string email = 1 [(buf.validate.field).string = {email: true, max_len: 320}];
  // Verification identifier (typeof verification, e.g. basic-auth-signup).
  string identifier = 2 [(buf.validate.field).string.min_len = 1];
  string state = 3;
}

message CreateEmailVerificationResponse {
  string message = 1;
}

message ConfirmEmailVerificationRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
  string state = 2;
}

message ConfirmEmailVerificationResponse {
  authorizer.session.v1.Session session = 1;
}
