syntax = "proto3";

package authorizer.verification.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "authorizer/common/v1/annotations.proto";

// PasswordResetService models the forgot-password flow as a challenge
// resource: Create dispatches an email/SMS with a reset link; Confirm
// applies the new password using the link's token.
service PasswordResetService {
  // CreatePasswordReset dispatches a reset notification. Returns 202.
  // Always returns success even when the address is unknown (prevents
  // account enumeration).
  rpc CreatePasswordReset(CreatePasswordResetRequest) returns (CreatePasswordResetResponse) {
    option (google.api.http) = {
      post: "/v1/password-resets"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
  }

  // ConfirmPasswordReset sets the user's new password using the token from
  // the reset notification.
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse) {
    option (google.api.http) = {
      put: "/v1/password-resets/{token}"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
    option (authorizer.common.v1.audit_log) = true;
  }
}

message CreatePasswordResetRequest {
  // Exactly one of email / phone_number is required.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string state = 3;
  string redirect_uri = 4;
}

message CreatePasswordResetResponse {
  string message = 1;
  // Mobile callers may need to render an OTP entry screen (when reset is
  // SMS-driven). Mirrors GraphQL ForgotPasswordResponse.
  bool should_show_mobile_otp_screen = 2;
}

message ConfirmPasswordResetRequest {
  // The token from the reset email/SMS; for SMS flows it's the OTP value.
  string token = 1 [(buf.validate.field).string.min_len = 1];
  // For SMS flows: the user identifier the OTP was bound to.
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string password = 3 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string confirm_password = 4 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
}

message ConfirmPasswordResetResponse {
  string message = 1;
}
