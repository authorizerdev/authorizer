// Shared message types used by the Authorizer service. Field naming mirrors
// the GraphQL schema 1:1 so REST/gRPC clients see the same shape.
syntax = "proto3";

package authorizer.v1;

import "authorizer/common/v1/types.proto";

// User mirrors the GraphQL User type. Returned by Profile and embedded in
// AuthResponse.
message User {
  string id = 1;
  // Either email or phone_number is always present.
  string email = 2;
  bool email_verified = 3;
  string signup_methods = 4;
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  // Defaults to email when unset.
  string preferred_username = 9;
  string gender = 10;
  string birthdate = 11;
  string phone_number = 12;
  bool phone_number_verified = 13;
  string picture = 14;
  repeated string roles = 15;
  int64 created_at = 16;
  int64 updated_at = 17;
  int64 revoked_timestamp = 18;
  bool is_multi_factor_auth_enabled = 19;
  // Free-form key/value bag — same as GraphQL `app_data: Map`.
  authorizer.common.v1.AppData app_data = 20;
}

// AuthResponse mirrors the GraphQL AuthResponse type. Returned (wrapped) by
// every method that produces a session: Signup, Login, MagicLinkLogin,
// VerifyEmail, VerifyOtp, Session.
message AuthResponse {
  string message = 1;
  bool should_show_email_otp_screen = 2;
  bool should_show_mobile_otp_screen = 3;
  bool should_show_totp_screen = 4;
  string access_token = 5;
  string id_token = 6;
  string refresh_token = 7;
  int64 expires_in = 8;
  User user = 9;
  // TOTP enrolment artifacts (populated only when this AuthResponse
  // initiates TOTP setup; one-time, never re-shown).
  string authenticator_scanner_image = 10;
  string authenticator_secret = 11;
  repeated string authenticator_recovery_codes = 12;
}

// Permission is one (resource, scope) pair the caller is allowed to act on.
message Permission {
  string resource = 1;
  string scope = 2;
}

// PermissionInput is the request-side mirror of Permission used by
// methods that take a list of required permissions.
message PermissionInput {
  string resource = 1;
  string scope = 2;
}

// Meta mirrors the GraphQL Meta type — server feature flags + provider
// availability, returned by the Meta query.
message Meta {
  string version = 1;
  string client_id = 2;
  bool is_google_login_enabled = 3;
  bool is_facebook_login_enabled = 4;
  bool is_github_login_enabled = 5;
  bool is_linkedin_login_enabled = 6;
  bool is_apple_login_enabled = 7;
  bool is_discord_login_enabled = 8;
  bool is_twitter_login_enabled = 9;
  bool is_microsoft_login_enabled = 10;
  bool is_twitch_login_enabled = 11;
  bool is_roblox_login_enabled = 12;
  bool is_email_verification_enabled = 13;
  bool is_basic_authentication_enabled = 14;
  bool is_magic_link_login_enabled = 15;
  bool is_sign_up_enabled = 16;
  bool is_strong_password_enabled = 17;
  bool is_multi_factor_auth_enabled = 18;
  bool is_mobile_basic_authentication_enabled = 19;
  bool is_phone_verification_enabled = 20;
}
