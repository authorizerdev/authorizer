// Shared message types used by the Authorizer service. Field naming mirrors
// the GraphQL schema 1:1 so REST/gRPC clients see the same shape.
syntax = "proto3";

package authorizer.v1;

import "authorizer/v1/common.proto";

// User mirrors the GraphQL User type. Returned by Profile and embedded in
// AuthResponse.
message User {
  string id = 1;
  // Either email or phone_number is always present.
  string email = 2;
  bool email_verified = 3;
  string signup_methods = 4;
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  // Defaults to email when unset.
  string preferred_username = 9;
  string gender = 10;
  string birthdate = 11;
  string phone_number = 12;
  bool phone_number_verified = 13;
  string picture = 14;
  repeated string roles = 15;
  int64 created_at = 16;
  int64 updated_at = 17;
  int64 revoked_timestamp = 18;
  bool is_multi_factor_auth_enabled = 19;
  // Free-form key/value bag — same as GraphQL `app_data: Map`.
  AppData app_data = 20;
  // Mirrors User.has_skipped_mfa_setup_at in GraphQL. 0 means never skipped.
  int64 has_skipped_mfa_setup_at = 21;
  // Mirrors User.mfa_locked_at in GraphQL. 0 means not locked.
  int64 mfa_locked_at = 22;
}

// AuthResponse mirrors the GraphQL AuthResponse type. Returned (wrapped) by
// every method that produces a session: Signup, Login, MagicLinkLogin,
// VerifyEmail, VerifyOtp, Session.
message AuthResponse {
  string message = 1;
  bool should_show_email_otp_screen = 2;
  bool should_show_mobile_otp_screen = 3;
  bool should_show_totp_screen = 4;
  string access_token = 5;
  string id_token = 6;
  string refresh_token = 7;
  int64 expires_in = 8;
  User user = 9;
  // TOTP enrolment artifacts (populated only when this AuthResponse
  // initiates TOTP setup; one-time, never re-shown).
  string authenticator_scanner_image = 10;
  string authenticator_secret = 11;
  repeated string authenticator_recovery_codes = 12;
  // Mirrors AuthResponse.should_offer_webauthn_mfa_verify in GraphQL.
  bool should_offer_webauthn_mfa_verify = 13;
  // Mirrors AuthResponse.should_offer_webauthn_mfa_setup in GraphQL.
  bool should_offer_webauthn_mfa_setup = 14;
  // Mirrors AuthResponse.should_offer_email_otp_mfa_setup in GraphQL.
  bool should_offer_email_otp_mfa_setup = 15;
  // Mirrors AuthResponse.should_offer_sms_otp_mfa_setup in GraphQL.
  bool should_offer_sms_otp_mfa_setup = 16;
}

// Permission is one (object, relation) pair the subject holds: "subject has
// `relation` on `object`". Mirrors the GraphQL Permission type.
message Permission {
  string object = 1;
  string relation = 2;
}

// FgaRelationInput is a (relation, object) requirement evaluated against the
// authenticated caller during Session / ValidateJwtToken / ValidateSession.
// AND semantics, fail-closed. Mirrors the GraphQL FgaRelationInput type.
message FgaRelationInput {
  string relation = 1;
  string object = 2;
}

// FgaTupleInput is one relationship tuple supplied as request-scoped context
// for a permission check; contextual tuples are never persisted. Mirrors the
// GraphQL FgaTupleInput type.
message FgaTupleInput {
  string user = 1;
  string relation = 2;
  string object = 3;
}

// PermissionCheckInput is one permission to evaluate: "does the subject have
// <relation> on <object>?". Mirrors the GraphQL PermissionCheckInput type.
message PermissionCheckInput {
  string relation = 1;
  string object = 2;
  repeated FgaTupleInput contextual_tuples = 3;
}

// PermissionCheckResult is the outcome of one permission check, echoing the
// checked pair so batch results are self-describing (and positionally
// aligned). Mirrors the GraphQL PermissionCheckResult type.
message PermissionCheckResult {
  string relation = 1;
  string object = 2;
  bool allowed = 3;
}

// Meta mirrors the GraphQL Meta type — server feature flags + provider
// availability, returned by the Meta query.
message Meta {
  string version = 1;
  string client_id = 2;
  bool is_google_login_enabled = 3;
  bool is_facebook_login_enabled = 4;
  bool is_github_login_enabled = 5;
  bool is_linkedin_login_enabled = 6;
  bool is_apple_login_enabled = 7;
  bool is_discord_login_enabled = 8;
  bool is_twitter_login_enabled = 9;
  bool is_microsoft_login_enabled = 10;
  bool is_twitch_login_enabled = 11;
  bool is_roblox_login_enabled = 12;
  bool is_email_verification_enabled = 13;
  bool is_basic_authentication_enabled = 14;
  bool is_magic_link_login_enabled = 15;
  bool is_sign_up_enabled = 16;
  bool is_strong_password_enabled = 17;
  bool is_multi_factor_auth_enabled = 18;
  bool is_mobile_basic_authentication_enabled = 19;
  bool is_phone_verification_enabled = 20;
  bool is_org_discovery_enabled = 21;
  bool is_totp_mfa_enabled = 22;
  bool is_email_otp_mfa_enabled = 23;
  bool is_sms_otp_mfa_enabled = 24;
  bool is_webauthn_enabled = 25;
  // Mirrors Meta.is_mfa_enforced in GraphQL.
  bool is_mfa_enforced = 26;
}
