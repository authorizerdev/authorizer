// AuthorizerService is the single gRPC service that exposes Authorizer's
// public API. Method names match the GraphQL operation names 1:1
// (snake_case in GraphQL → PascalCase in proto): Signup, Login,
// MagicLinkLogin, VerifyEmail, ResendVerifyEmail, ForgotPassword,
// ResetPassword, VerifyOtp, ResendOtp, SkipMfaSetup, LockMfa,
// EmailOtpMfaSetup, SmsOtpMfaSetup, UpdateProfile, DeactivateAccount,
// Revoke, Meta, Session, Profile, ValidateJwtToken, ValidateSession,
// CheckPermissions, ListPermissions, Logout.
//
// Why one service: clients consume a single typed client per language,
// discovery is trivial, and the surface mirrors the GraphQL one users
// already know. The trade-off is that we lose resource-oriented evolution
// (no `List/Get/Create` symmetry per resource) — acceptable for an auth
// surface where most operations are stateless verbs anyway.
//
// REST mapping follows a simple rule:
//   - GET /v1/{method} when the request body is empty (Meta, Profile,
//     Logout)
//   - POST /v1/{method} otherwise
syntax = "proto3";

package authorizer.v1;

import "authorizer/v1/annotations.proto";
import "authorizer/v1/common.proto";
import "authorizer/v1/types.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";

service AuthorizerService {
  // === Identity creation & authentication ===

  // Signup registers a new user. Public; requires sign-up enabled in config.
  // Returns AuthResponse with tokens + (browser callers) Set-Cookie headers.
  rpc Signup(SignupRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/signup"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
    option (authorizer.v1.mcp_tool) = {exposed: false}; // creds
  }

  // Login authenticates with email/phone + password.
  rpc Login(LoginRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
    option (authorizer.v1.mcp_tool) = {exposed: false}; // creds
  }

  // Logout ends the caller's current session. POST, not GET: logout mutates
  // server state (clears the session) and is audit-logged, so it must not be
  // a "safe" method per RFC 9110 §9.2.1 — GET would also expose it to CSRF.
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {post: "/v1/logout"};
    option (authorizer.v1.audit_log) = true;
  }

  // MagicLinkLogin dispatches a passwordless email link. The clicked link
  // hits the existing /verify_email browser handler.
  rpc MagicLinkLogin(MagicLinkLoginRequest) returns (MagicLinkLoginResponse) {
    option (google.api.http) = {
      post: "/v1/magic_link_login"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // === Email + OTP verification ===

  rpc VerifyEmail(VerifyEmailRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/verify_email"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  rpc ResendVerifyEmail(ResendVerifyEmailRequest) returns (ResendVerifyEmailResponse) {
    option (google.api.http) = {
      post: "/v1/resend_verify_email"
      body: "*"
    };
    option (authorizer.v1.public) = true;
  }

  rpc VerifyOtp(VerifyOtpRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/verify_otp"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  rpc ResendOtp(ResendOtpRequest) returns (ResendOtpResponse) {
    option (google.api.http) = {
      post: "/v1/resend_otp"
      body: "*"
    };
    option (authorizer.v1.public) = true;
  }

  // SkipMfaSetup completes an in-progress, token-withheld MFA offer by
  // recording that the caller explicitly declined it, then issues the
  // access token that was withheld. Identified by the MFA session cookie
  // (set when the offer screen was returned) plus email/phone_number to
  // resolve the pending user — same identification pattern as VerifyOtp.
  // Fails with FAILED_PRECONDITION if MFA is organization-enforced
  // (enforce-mfa) — enforcement is never skippable.
  rpc SkipMfaSetup(SkipMfaSetupRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/skip_mfa_setup"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // LockMfa records that the caller lost access to their only MFA
  // factor(s). Only allowed when the caller has NO verified Email/SMS OTP
  // fallback enrolled — if one exists, use it instead of locking. Does not
  // issue a token; the account requires admin recovery afterward.
  rpc LockMfa(LockMfaRequest) returns (LockMfaResponse) {
    option (google.api.http) = {
      post: "/v1/lock_mfa"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // EmailOtpMfaSetup sends a one-time code to the caller's own email and
  // creates an unverified email-OTP MFA enrollment. Dual-mode permissions:
  // (a) an authenticated caller (bearer token) — the settings-screen action
  // for an ALREADY-logged-in user adding a second factor; the request body is
  // unused in this mode. (b) a caller in the withheld first-time-offer
  // state, with no bearer token yet — identified by the MFA session cookie
  // plus email/phone_number, same pattern as SkipMfaSetup. Either mode
  // reuses the same underlying Authenticator row once VerifyOtp marks it
  // verified.
  rpc EmailOtpMfaSetup(EmailOtpMfaSetupRequest) returns (EmailOtpMfaSetupResponse) {
    option (google.api.http) = {
      post: "/v1/email_otp_mfa_setup"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // SmsOtpMfaSetup sends a one-time code to the caller's own phone number
  // and creates an unverified SMS-OTP MFA enrollment. Same dual-mode
  // permissions and relationship to VerifyOtp as EmailOtpMfaSetup.
  rpc SmsOtpMfaSetup(SmsOtpMfaSetupRequest) returns (SmsOtpMfaSetupResponse) {
    option (google.api.http) = {
      post: "/v1/sms_otp_mfa_setup"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // === Password lifecycle ===

  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse) {
    option (google.api.http) = {
      post: "/v1/forgot_password"
      body: "*"
    };
    option (authorizer.v1.public) = true;
  }

  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse) {
    option (google.api.http) = {
      post: "/v1/reset_password"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // === Profile + account ===

  // Profile returns the authenticated user.
  rpc Profile(ProfileRequest) returns (User) {
    option (google.api.http) = {get: "/v1/profile"};
    option (authorizer.v1.mcp_tool) = {exposed: true};
  }

  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse) {
    option (google.api.http) = {
      post: "/v1/update_profile"
      body: "*"
    };
    option (authorizer.v1.audit_log) = true;
  }

  // DeactivateAccount soft-deletes the caller's account and revokes all
  // refresh tokens as a side effect. OAuth has no concept of account
  // deactivation; this is the typed equivalent of SCIM PATCH active=false.
  rpc DeactivateAccount(DeactivateAccountRequest) returns (DeactivateAccountResponse) {
    option (google.api.http) = {
      post: "/v1/deactivate_account"
      body: "*"
    };
    option (authorizer.v1.audit_log) = true;
    option (authorizer.v1.mcp_tool) = {
      exposed: false
      destructive: true
    };
  }

  // === Token + session ===

  // Revoke invalidates a refresh token. Typed mirror of RFC 7009.
  rpc Revoke(RevokeRequest) returns (RevokeResponse) {
    option (google.api.http) = {
      post: "/v1/revoke"
      body: "*"
    };
    option (authorizer.v1.public) = true;
    option (authorizer.v1.audit_log) = true;
  }

  // Session returns the AuthResponse bound to the caller's session cookie only.
  // NOT exposed as an MCP tool — SessionResponse carries access_token,
  // refresh_token, id_token, authenticator_secret, and recovery codes,
  // none of which should land in an LLM transcript. (Security audit C1.)
  rpc Session(SessionRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/session"
      body: "*"
    };
  }

  rpc ValidateJwtToken(ValidateJwtTokenRequest) returns (ValidateJwtTokenResponse) {
    option (google.api.http) = {
      post: "/v1/validate_jwt_token"
      body: "*"
    };
    option (authorizer.v1.public) = true;
  }

  rpc ValidateSession(ValidateSessionRequest) returns (ValidateSessionResponse) {
    option (google.api.http) = {
      post: "/v1/validate_session"
      body: "*"
    };
    option (authorizer.v1.public) = true;
  }

  // === Server discovery + caller authz ===

  // Meta returns server feature flags. No auth required.
  rpc Meta(MetaRequest) returns (authorizer.v1.Meta) {
    option (google.api.http) = {get: "/v1/meta"};
    option (authorizer.v1.public) = true;
    option (authorizer.v1.mcp_tool) = {exposed: true};
  }

  // CheckPermissions evaluates one or more fine-grained permission checks
  // ("does the subject have <relation> on <object>?") in a single call and
  // returns one result per check, in order. The subject defaults to the
  // authenticated caller; an explicit `user` is honored only for super-admins
  // or when it equals the caller's own subject. Fail-closed.
  rpc CheckPermissions(CheckPermissionsRequest) returns (CheckPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/check_permissions"
      body: "*"
    };
    option (authorizer.v1.mcp_tool) = {exposed: true};
  }

  // ListPermissions enumerates what the subject can access. With both
  // `relation` and `object_type` set it answers "which <object_type>s can I
  // <relation>?"; either or both filters may be omitted to enumerate every
  // matching (type, relation) pair of the active model. Results are capped;
  // `truncated` reports when more permissions exist. Subject resolution
  // follows the same rules as CheckPermissions.
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/list_permissions"
      body: "*"
    };
    option (authorizer.v1.mcp_tool) = {exposed: true};
  }
}

// ============================================================================
// Per-RPC request + response messages.
//
// Buf STANDARD lint requires unique req/resp types per RPC. Many of our
// responses naturally share the same inner shape (AuthResponse, User, etc.),
// so the wrappers below are thin: one field, the typed inner payload. This
// gives forward evolution room (we can add fields per-RPC without disturbing
// the others) at the cost of one extra accessor level on the client side.
// ============================================================================

message SignupRequest {
  string email = 1 [(buf.validate.field).string = {max_len: 320}];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string password = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string confirm_password = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  string gender = 9;
  string birthdate = 10;
  string picture = 11;
  repeated string roles = 12;
  repeated string scope = 13;
  string redirect_uri = 14;
  bool is_multi_factor_auth_enabled = 15;
  string state = 16;
  AppData app_data = 17;
}
message LoginRequest {
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string password = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  repeated string roles = 4;
  repeated string scope = 5;
  string state = 6;
}
message LogoutRequest {}
message LogoutResponse {
  string message = 1;
}

message MagicLinkLoginRequest {
  string email = 1 [(buf.validate.field).string = {max_len: 320}];
  repeated string roles = 2;
  repeated string scope = 3;
  string state = 4;
  string redirect_uri = 5;
}
message MagicLinkLoginResponse {
  string message = 1;
}

message VerifyEmailRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
  string state = 2;
}
message ResendVerifyEmailRequest {
  string email = 1 [(buf.validate.field).string = {max_len: 320}];
  string identifier = 2 [(buf.validate.field).string.min_len = 1];
  string state = 3;
}
message ResendVerifyEmailResponse {
  string message = 1;
}

message VerifyOtpRequest {
  // Exactly one of email / phone_number is required.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string otp = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 16
  }];
  bool is_totp = 4;
  string state = 5;
}
message ResendOtpRequest {
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string state = 3;
}
message ResendOtpResponse {
  string message = 1;
}

message SkipMfaSetupRequest {
  // Either email or phone_number is required, to resolve which user's MFA
  // session cookie this is.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string state = 3;
}
message LockMfaRequest {
  // Either email or phone_number is required, to resolve which user's MFA
  // session cookie this is — same pattern as SkipMfaSetupRequest.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
}
message LockMfaResponse {
  string message = 1;
}
message EmailOtpMfaSetupRequest {
  // Only used in the MFA-session-cookie mode (a caller in the withheld
  // first-time-offer state, with no bearer token yet) to resolve which
  // user's MFA session cookie this is — same pattern as SkipMfaSetupRequest
  // / LockMfaRequest. Ignored when the caller has a valid bearer
  // token/session, which already identifies the user.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
}
message EmailOtpMfaSetupResponse {
  string message = 1;
}
message SmsOtpMfaSetupRequest {
  // Same dual-mode identification semantics as EmailOtpMfaSetupRequest.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
}
message SmsOtpMfaSetupResponse {
  string message = 1;
}

message ForgotPasswordRequest {
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string state = 3;
  string redirect_uri = 4;
}
message ForgotPasswordResponse {
  string message = 1;
  // For SMS-driven flows the UI may need to render an OTP entry screen.
  bool should_show_mobile_otp_screen = 2;
}

message ResetPasswordRequest {
  // For email flows: the token from the reset email. For SMS flows: the OTP.
  string token = 1;
  string otp = 2;
  string phone_number = 3 [(buf.validate.field).string.max_len = 32];
  string password = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  string confirm_password = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}
message ResetPasswordResponse {
  string message = 1;
}

message ProfileRequest {}
message UpdateProfileRequest {
  string old_password = 1;
  string new_password = 2 [(buf.validate.field).string.max_len = 128];
  string confirm_new_password = 3 [(buf.validate.field).string.max_len = 128];
  string email = 4 [(buf.validate.field).string.max_len = 320];
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  string gender = 9;
  string birthdate = 10;
  string phone_number = 11 [(buf.validate.field).string.max_len = 32];
  string picture = 12;
  // optional: absent means "leave MFA unchanged"; present false explicitly
  // disables MFA. A non-optional bool would make every partial update send
  // false and silently disable MFA.
  optional bool is_multi_factor_auth_enabled = 13;
  AppData app_data = 14;
}
message UpdateProfileResponse {
  string message = 1;
}

message DeactivateAccountRequest {}
message DeactivateAccountResponse {
  string message = 1;
}

message RevokeRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}
message RevokeResponse {
  string message = 1;
}

message SessionRequest {
  repeated string roles = 1;
  repeated string scope = 2;
  string state = 3;
  // Optional fine-grained authorization gate: each (relation, object) is
  // checked against the authenticated caller with AND semantics, fail-closed.
  // Requires fine-grained authorization enabled (--fga-store).
  repeated FgaRelationInput required_relations = 4;
}
message ValidateJwtTokenRequest {
  string token_type = 1 [(buf.validate.field).string.min_len = 1];
  string token = 2 [(buf.validate.field).string.min_len = 1];
  repeated string roles = 3;
  // Optional fine-grained authorization gate (AND semantics, fail-closed).
  repeated FgaRelationInput required_relations = 4;
}
message ValidateJwtTokenResponse {
  bool is_valid = 1;
  // Free-form JWT claims (matches GraphQL ValidateJWTTokenResponse.claims).
  AppData claims = 2;
}

message ValidateSessionRequest {
  string cookie = 1 [(buf.validate.field).string.min_len = 1];
  repeated string roles = 2;
  // Optional fine-grained authorization gate (AND semantics, fail-closed).
  repeated FgaRelationInput required_relations = 3;
}
message ValidateSessionResponse {
  bool is_valid = 1;
  User user = 2;
}

message MetaRequest {}
message CheckPermissionsRequest {
  // The checks to evaluate; at least one, at most 100.
  repeated PermissionCheckInput checks = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
  }];
  // Optional explicit subject ("type:id", or a bare id treated as
  // "user:<id>"). Honored only for super-admins or when it equals the
  // caller's own token subject; anything else is rejected.
  string user = 2;
}
message CheckPermissionsResponse {
  // One result per supplied check, in order.
  repeated PermissionCheckResult results = 1;
}

message ListPermissionsRequest {
  // Optional relation filter (e.g. "can_view").
  string relation = 1;
  // Optional object-type filter (e.g. "document").
  string object_type = 2;
  // Optional explicit subject; same trust rules as CheckPermissionsRequest.
  string user = 3;
}
message ListPermissionsResponse {
  // Distinct fully-qualified object ids the subject can access.
  repeated string objects = 1;
  // The (object, relation) detail — relevant when no relation filter was
  // supplied.
  repeated Permission permissions = 2;
  // True when the result was capped (1000 entries) and more permissions
  // exist.
  bool truncated = 3;
}
