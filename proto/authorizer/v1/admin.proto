// proto/authorizer/v1/admin.proto
//
// AuthorizerAdminService exposes Authorizer's super-admin-only operations
// (the `_`-prefixed GraphQL queries/mutations). It is registered on the SAME
// grpc.Server and gateway mux as AuthorizerService. Every RPC requires
// super-admin auth (admin session cookie or x-authorizer-admin-secret header)
// except AdminLogin, which establishes it. Admin operations are intentionally
// NOT exposed over MCP.
syntax = "proto3";

package authorizer.v1;

import "authorizer/v1/common.proto";
import "authorizer/v1/pagination.proto";
import "authorizer/v1/types.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";

// AuthorizerAdminService is the single gRPC service for Authorizer's admin
// (super-admin-only) API surface. RPCs are added one domain group at a time;
// see specs/2026-06-15-authorizer-admin-service-plan.md.
service AuthorizerAdminService {
  // === Admin auth + meta ===

  // AdminLogin validates the admin secret and establishes an admin session
  // (Set-Cookie for browser callers). Public entry point — the ONLY admin RPC
  // that does not require an existing super-admin session.
  rpc AdminLogin(AdminLoginRequest) returns (AdminLoginResponse) {
    option (google.api.http) = {
      post: "/v1/admin/login"
      body: "*"
    };
  }

  // AdminLogout clears the admin session cookie. Requires super-admin auth.
  rpc AdminLogout(AdminLogoutRequest) returns (AdminLogoutResponse) {
    option (google.api.http) = {post: "/v1/admin/logout"};
  }

  // AdminSession refreshes the admin session cookie. Requires super-admin auth.
  rpc AdminSession(AdminSessionRequest) returns (AdminSessionResponse) {
    option (google.api.http) = {get: "/v1/admin/session"};
  }

  // AdminMeta returns admin-only configuration metadata (configured roles,
  // default roles, protected roles). Requires super-admin auth.
  rpc AdminMeta(AdminMetaRequest) returns (AdminMetaResponse) {
    option (google.api.http) = {get: "/v1/admin/meta"};
  }

  // === Users ===

  // Users returns a paginated list of all users. Requires super-admin auth.
  rpc Users(UsersRequest) returns (UsersResponse) {
    option (google.api.http) = {
      post: "/v1/admin/users"
      body: "*"
    };
  }

  // User returns a single user by id or email. Requires super-admin auth.
  rpc User(UserRequest) returns (UserResponse) {
    option (google.api.http) = {
      post: "/v1/admin/user"
      body: "*"
    };
  }

  // UpdateUser updates a user's profile, roles, MFA, or verification state and
  // returns the updated user. Requires super-admin auth.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      post: "/v1/admin/update_user"
      body: "*"
    };
  }

  // DeleteUser deletes a user (and associated OTP/verification data) by email.
  // Requires super-admin auth.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {
      post: "/v1/admin/delete_user"
      body: "*"
    };
  }

  // VerificationRequests returns a paginated list of pending verification
  // requests. Requires super-admin auth.
  rpc VerificationRequests(VerificationRequestsRequest) returns (VerificationRequestsResponse) {
    option (google.api.http) = {
      post: "/v1/admin/verification_requests"
      body: "*"
    };
  }

  // === Access ===

  // RevokeAccess revokes a user's access (sets the revoked timestamp), kills
  // their sessions, and fires the access-revoked webhook. Requires super-admin
  // auth.
  rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse) {
    option (google.api.http) = {
      post: "/v1/admin/revoke_access"
      body: "*"
    };
  }

  // EnableAccess re-enables a previously revoked user (clears the revoked
  // timestamp) and fires the access-enabled webhook. Requires super-admin auth.
  rpc EnableAccess(EnableAccessRequest) returns (EnableAccessResponse) {
    option (google.api.http) = {
      post: "/v1/admin/enable_access"
      body: "*"
    };
  }

  // InviteMembers creates accounts for new emails and sends invite emails.
  // Requires super-admin auth and a configured email service.
  rpc InviteMembers(InviteMembersRequest) returns (InviteMembersResponse) {
    option (google.api.http) = {
      post: "/v1/admin/invite_members"
      body: "*"
    };
  }

  // === Webhooks ===

  // AddWebhook registers a new webhook for an event. Requires super-admin auth.
  rpc AddWebhook(AddWebhookRequest) returns (AddWebhookResponse) {
    option (google.api.http) = {
      post: "/v1/admin/add_webhook"
      body: "*"
    };
  }

  // UpdateWebhook updates an existing webhook's event, endpoint, headers, or
  // enabled state. Requires super-admin auth.
  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse) {
    option (google.api.http) = {
      post: "/v1/admin/update_webhook"
      body: "*"
    };
  }

  // DeleteWebhook deletes a webhook by id. Requires super-admin auth.
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse) {
    option (google.api.http) = {
      post: "/v1/admin/delete_webhook"
      body: "*"
    };
  }

  // GetWebhook returns a single webhook by id. Requires super-admin auth.
  rpc GetWebhook(GetWebhookRequest) returns (GetWebhookResponse) {
    option (google.api.http) = {
      post: "/v1/admin/webhook"
      body: "*"
    };
  }

  // Webhooks returns a paginated list of webhooks. Requires super-admin auth.
  rpc Webhooks(WebhooksRequest) returns (WebhooksResponse) {
    option (google.api.http) = {
      post: "/v1/admin/webhooks"
      body: "*"
    };
  }

  // WebhookLogs returns a paginated list of webhook delivery logs, optionally
  // filtered by webhook id. Requires super-admin auth.
  rpc WebhookLogs(WebhookLogsRequest) returns (WebhookLogsResponse) {
    option (google.api.http) = {
      post: "/v1/admin/webhook_logs"
      body: "*"
    };
  }

  // TestEndpoint sends a synthetic event payload to a webhook endpoint and
  // returns the HTTP status and response body. Requires super-admin auth.
  rpc TestEndpoint(TestEndpointRequest) returns (TestEndpointResponse) {
    option (google.api.http) = {
      post: "/v1/admin/test_endpoint"
      body: "*"
    };
  }

  // === Email templates ===

  // AddEmailTemplate creates a new email template for an event. Requires
  // super-admin auth.
  rpc AddEmailTemplate(AddEmailTemplateRequest) returns (AddEmailTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/admin/add_email_template"
      body: "*"
    };
  }

  // UpdateEmailTemplate updates an existing email template's event, subject,
  // body, or design. Requires super-admin auth.
  rpc UpdateEmailTemplate(UpdateEmailTemplateRequest) returns (UpdateEmailTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/admin/update_email_template"
      body: "*"
    };
  }

  // DeleteEmailTemplate deletes an email template by id. Requires super-admin
  // auth.
  rpc DeleteEmailTemplate(DeleteEmailTemplateRequest) returns (DeleteEmailTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/admin/delete_email_template"
      body: "*"
    };
  }

  // EmailTemplates returns a paginated list of email templates. Requires
  // super-admin auth.
  rpc EmailTemplates(EmailTemplatesRequest) returns (EmailTemplatesResponse) {
    option (google.api.http) = {
      post: "/v1/admin/email_templates"
      body: "*"
    };
  }

  // === Audit ===

  // AuditLogs returns a paginated, optionally-filtered list of audit log
  // entries. Requires super-admin auth.
  rpc AuditLogs(AuditLogsRequest) returns (AuditLogsResponse) {
    option (google.api.http) = {
      post: "/v1/admin/audit_logs"
      body: "*"
    };
  }

  // === FGA (fine-grained authorization) admin ===
  //
  // Every FGA admin RPC fails closed when no authorization engine is configured
  // (no --fga-store): it returns FailedPrecondition rather than nil-deref or
  // silently succeeding. Requires super-admin auth.

  // FgaGetModel returns the active fine-grained authorization model as DSL. A
  // store with no model yet returns an empty model (not an error). Requires
  // super-admin auth.
  rpc FgaGetModel(FgaGetModelRequest) returns (FgaGetModelResponse) {
    option (google.api.http) = {get: "/v1/admin/fga/model"};
  }

  // FgaWriteModel installs a new fine-grained authorization model from its DSL
  // and returns the new model id. Requires super-admin auth. Audited.
  rpc FgaWriteModel(FgaWriteModelRequest) returns (FgaWriteModelResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/model"
      body: "*"
    };
  }

  // FgaWriteTuples persists the given relationship tuples (additive). Requires
  // super-admin auth. Audited.
  rpc FgaWriteTuples(FgaWriteTuplesRequest) returns (FgaWriteTuplesResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/tuples"
      body: "*"
    };
  }

  // FgaDeleteTuples removes the given relationship tuples. Requires super-admin
  // auth. Audited.
  rpc FgaDeleteTuples(FgaDeleteTuplesRequest) returns (FgaDeleteTuplesResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/tuples/delete"
      body: "*"
    };
  }

  // FgaReadTuples returns a page of persisted tuples matching the filter.
  // Requires super-admin auth.
  rpc FgaReadTuples(FgaReadTuplesRequest) returns (FgaReadTuplesResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/tuples/read"
      body: "*"
    };
  }

  // FgaListUsers returns the fully-qualified user ids of user_type that have
  // relation on object ("who can access this object?"). Requires super-admin
  // auth.
  rpc FgaListUsers(FgaListUsersRequest) returns (FgaListUsersResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/list_users"
      body: "*"
    };
  }

  // FgaExpand returns the OpenFGA relationship/userset tree for (relation,
  // object) as a JSON string (the explainability primitive). Requires
  // super-admin auth.
  rpc FgaExpand(FgaExpandRequest) returns (FgaExpandResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/expand"
      body: "*"
    };
  }

  // FgaReset deletes the entire fine-grained authorization store (the model,
  // all its versions, and all tuples) and starts a fresh, empty store. Refused
  // while any tuples still exist. Requires super-admin auth. Destructive and
  // audited.
  rpc FgaReset(FgaResetRequest) returns (FgaResetResponse) {
    option (google.api.http) = {
      post: "/v1/admin/fga/reset"
      body: "*"
    };
  }
}

// ============================================================================
// Per-RPC request + response messages.
//
// Ops that return model.Response use an inline `string message = 1;` (no shared
// Response message), matching the public AuthorizerService convention.
// ============================================================================

message AdminLoginRequest {
  string admin_secret = 1 [(buf.validate.field).string.min_len = 1];
}
message AdminLoginResponse {
  string message = 1;
}

message AdminLogoutRequest {}
message AdminLogoutResponse {
  string message = 1;
}

message AdminSessionRequest {}
message AdminSessionResponse {
  string message = 1;
}

message AdminMetaRequest {}
message AdminMetaResponse {
  AdminMeta admin_meta = 1;
}

// AdminMeta mirrors model.AdminMeta exactly (no version field).
message AdminMeta {
  repeated string roles = 1;
  repeated string default_roles = 2;
  repeated string protected_roles = 3;
}

// === Users ===

message UsersRequest {
  PaginationRequest pagination = 1;
}
message UsersResponse {
  repeated User users = 1;
  Pagination pagination = 2;
}

// UserRequest fetches a single user by id or email; at least one must be set.
message UserRequest {
  string id = 1;
  string email = 2;
}
message UserResponse {
  User user = 1;
}

// UpdateUserRequest mirrors model.UpdateUserRequest. Nullable GraphQL inputs use
// proto3 `optional` so an unset field is distinguishable from an empty value
// (e.g. clearing a name vs leaving it untouched, or email_verified=false).
message UpdateUserRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  optional string email = 2;
  optional bool email_verified = 3;
  optional string given_name = 4;
  optional string family_name = 5;
  optional string middle_name = 6;
  optional string nickname = 7;
  optional string gender = 8;
  optional string birthdate = 9;
  optional string phone_number = 10;
  optional bool phone_number_verified = 11;
  optional string picture = 12;
  repeated string roles = 13;
  optional bool is_multi_factor_auth_enabled = 14;
  AppData app_data = 15;
}
message UpdateUserResponse {
  User user = 1;
}

// DeleteUserRequest mirrors model.DeleteUserRequest.
message DeleteUserRequest {
  string email = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteUserResponse {
  string message = 1;
}

message VerificationRequestsRequest {
  PaginationRequest pagination = 1;
}
message VerificationRequestsResponse {
  repeated VerificationRequest verification_requests = 1;
  Pagination pagination = 2;
}

// VerificationRequest mirrors model.VerificationRequest field-for-field.
message VerificationRequest {
  string id = 1;
  string identifier = 2;
  string token = 3;
  string email = 4;
  int64 expires = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  string nonce = 8;
  string redirect_uri = 9;
}

// === Access ===

// RevokeAccessRequest mirrors model.UpdateAccessRequest (a single user id). It
// is kept distinct from EnableAccessRequest per buf's one-message-per-RPC rule.
message RevokeAccessRequest {
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}
message RevokeAccessResponse {
  string message = 1;
}

// EnableAccessRequest mirrors model.UpdateAccessRequest (a single user id). It
// is kept distinct from RevokeAccessRequest per buf's one-message-per-RPC rule.
message EnableAccessRequest {
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}
message EnableAccessResponse {
  string message = 1;
}

// InviteMembersRequest mirrors model.InviteMemberRequest. redirect_uri is
// optional; when unset the configured app URL is used.
message InviteMembersRequest {
  repeated string emails = 1;
  optional string redirect_uri = 2;
}

// InviteMembersResponse mirrors model.InviteMembersResponse (a message plus the
// list of newly invited users).
message InviteMembersResponse {
  string message = 1;
  repeated User users = 2;
}

// === Webhooks ===

// Webhook mirrors model.Webhook field-for-field. headers is a free-form JSON
// object (reusing the shared AppData wrapper around google.protobuf.Struct).
message Webhook {
  string id = 1;
  string event_name = 2;
  string event_description = 3;
  string endpoint = 4;
  bool enabled = 5;
  AppData headers = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

// WebhookLog mirrors model.WebhookLog field-for-field.
message WebhookLog {
  string id = 1;
  int64 http_status = 2;
  string response = 3;
  string request = 4;
  string webhook_id = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

// AddWebhookRequest mirrors model.AddWebhookRequest. event_description is
// optional; when unset it defaults to the event name with dots replaced by
// spaces.
message AddWebhookRequest {
  string event_name = 1 [(buf.validate.field).string.min_len = 1];
  optional string event_description = 2;
  string endpoint = 3 [(buf.validate.field).string.min_len = 1];
  bool enabled = 4;
  AppData headers = 5;
}
message AddWebhookResponse {
  string message = 1;
}

// UpdateWebhookRequest mirrors model.UpdateWebhookRequest. Nullable GraphQL
// inputs use proto3 `optional` so an unset field is distinguishable from an
// empty value.
message UpdateWebhookRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  optional string event_name = 2;
  optional string event_description = 3;
  optional string endpoint = 4;
  optional bool enabled = 5;
  AppData headers = 6;
}
message UpdateWebhookResponse {
  string message = 1;
}

// DeleteWebhookRequest mirrors model.WebhookRequest (a single webhook id). It is
// kept distinct from GetWebhookRequest per buf's one-message-per-RPC rule.
message DeleteWebhookRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteWebhookResponse {
  string message = 1;
}

// GetWebhookRequest mirrors model.WebhookRequest (a single webhook id). It is
// kept distinct from DeleteWebhookRequest per buf's one-message-per-RPC rule.
message GetWebhookRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message GetWebhookResponse {
  Webhook webhook = 1;
}

message WebhooksRequest {
  PaginationRequest pagination = 1;
}
message WebhooksResponse {
  repeated Webhook webhooks = 1;
  Pagination pagination = 2;
}

// WebhookLogsRequest mirrors model.ListWebhookLogRequest. webhook_id is
// optional; when unset logs for all webhooks are returned.
message WebhookLogsRequest {
  PaginationRequest pagination = 1;
  optional string webhook_id = 2;
}
message WebhookLogsResponse {
  repeated WebhookLog webhook_logs = 1;
  Pagination pagination = 2;
}

// TestEndpointRequest mirrors model.TestEndpointRequest. event_description is
// optional and unused by the test payload but accepted for parity.
message TestEndpointRequest {
  string endpoint = 1 [(buf.validate.field).string.min_len = 1];
  string event_name = 2 [(buf.validate.field).string.min_len = 1];
  optional string event_description = 3;
  AppData headers = 4;
}

// TestEndpointResponse mirrors model.TestEndpointResponse.
message TestEndpointResponse {
  int64 http_status = 1;
  string response = 2;
}

// === Email templates ===

// EmailTemplate mirrors model.EmailTemplate field-for-field.
message EmailTemplate {
  string id = 1;
  string event_name = 2;
  string template = 3;
  string design = 4;
  string subject = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

// AddEmailTemplateRequest mirrors model.AddEmailTemplateRequest. design is
// optional.
message AddEmailTemplateRequest {
  string event_name = 1 [(buf.validate.field).string.min_len = 1];
  string subject = 2 [(buf.validate.field).string.min_len = 1];
  string template = 3 [(buf.validate.field).string.min_len = 1];
  optional string design = 4;
}
message AddEmailTemplateResponse {
  string message = 1;
}

// UpdateEmailTemplateRequest mirrors model.UpdateEmailTemplateRequest. Nullable
// GraphQL inputs use proto3 `optional` so an unset field is distinguishable from
// an empty value.
message UpdateEmailTemplateRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  optional string event_name = 2;
  optional string template = 3;
  optional string subject = 4;
  optional string design = 5;
}
message UpdateEmailTemplateResponse {
  string message = 1;
}

// DeleteEmailTemplateRequest mirrors model.DeleteEmailTemplateRequest (a single
// email template id).
message DeleteEmailTemplateRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteEmailTemplateResponse {
  string message = 1;
}

message EmailTemplatesRequest {
  PaginationRequest pagination = 1;
}
message EmailTemplatesResponse {
  repeated EmailTemplate email_templates = 1;
  Pagination pagination = 2;
}

// === Audit ===

// AuditLog mirrors model.AuditLog field-for-field.
message AuditLog {
  string id = 1;
  string actor_id = 2;
  string actor_type = 3;
  string actor_email = 4;
  string action = 5;
  string resource_type = 6;
  string resource_id = 7;
  string ip_address = 8;
  string user_agent = 9;
  string metadata = 10;
  int64 created_at = 11;
}

// AuditLogsRequest mirrors model.ListAuditLogRequest. All filter fields are
// optional; when unset no filtering is applied for that field.
message AuditLogsRequest {
  PaginationRequest pagination = 1;
  optional string action = 2;
  optional string actor_id = 3;
  optional string resource_type = 4;
  optional string resource_id = 5;
  optional int64 from_timestamp = 6;
  optional int64 to_timestamp = 7;
}
message AuditLogsResponse {
  repeated AuditLog audit_logs = 1;
  Pagination pagination = 2;
}

// === FGA (fine-grained authorization) admin ===

// FgaModel is a fine-grained authorization model: its id and DSL form. Mirrors
// model.FgaModel field-for-field. An empty model (both fields empty) is the
// valid "no model written yet" state.
message FgaModel {
  string id = 1;
  string dsl = 2;
}

// FgaTuple is one persisted relationship tuple returned by FgaReadTuples.
// Mirrors model.FgaTuple field-for-field (the read shape; writes use the shared
// FgaTupleInput).
message FgaTuple {
  string user = 1;
  string relation = 2;
  string object = 3;
}

// FgaGetModelRequest takes no parameters; the active model is implied.
message FgaGetModelRequest {}
message FgaGetModelResponse {
  FgaModel model = 1;
}

// FgaWriteModelRequest mirrors model.FgaWriteModelInput (the model DSL).
message FgaWriteModelRequest {
  string dsl = 1 [(buf.validate.field).string.min_len = 1];
}
message FgaWriteModelResponse {
  FgaModel model = 1;
}

// FgaWriteTuplesRequest mirrors model.FgaWriteTuplesInput, reusing the shared
// FgaTupleInput message.
message FgaWriteTuplesRequest {
  repeated FgaTupleInput tuples = 1;
}
message FgaWriteTuplesResponse {
  string message = 1;
}

// FgaDeleteTuplesRequest mirrors model.FgaWriteTuplesInput (same shape as a
// write; the tuples to remove).
message FgaDeleteTuplesRequest {
  repeated FgaTupleInput tuples = 1;
}
message FgaDeleteTuplesResponse {
  string message = 1;
}

// FgaReadTuplesRequest mirrors model.FgaReadTuplesInput. All filter fields are
// optional; an empty filter reads all tuples (paginated).
message FgaReadTuplesRequest {
  optional string user = 1;
  optional string relation = 2;
  optional string object = 3;
  optional int64 page_size = 4;
  optional string continuation_token = 5;
}
message FgaReadTuplesResponse {
  repeated FgaTuple tuples = 1;
  optional string continuation_token = 2;
}

// FgaListUsersRequest mirrors model.FgaListUsersInput.
message FgaListUsersRequest {
  string object = 1 [(buf.validate.field).string.min_len = 1];
  string relation = 2 [(buf.validate.field).string.min_len = 1];
  string user_type = 3 [(buf.validate.field).string.min_len = 1];
}
message FgaListUsersResponse {
  repeated string users = 1;
}

// FgaExpandRequest mirrors model.FgaExpandInput.
message FgaExpandRequest {
  string relation = 1 [(buf.validate.field).string.min_len = 1];
  string object = 2 [(buf.validate.field).string.min_len = 1];
}
message FgaExpandResponse {
  string tree = 1;
}

// FgaResetRequest takes no parameters; the whole store is reset.
message FgaResetRequest {}
message FgaResetResponse {
  string message = 1;
}
