syntax = "proto3";

package authorizer.meta.v1;

import "google/api/annotations.proto";
import "authorizer/common/v1/annotations.proto";

// MetaService exposes server-discovery information. All methods are public.
service MetaService {
  // GetMeta returns the server's feature-flag and provider configuration.
  // Used by SPAs to decide which login UIs to render.
  rpc GetMeta(GetMetaRequest) returns (GetMetaResponse) {
    option (google.api.http) = {get: "/v1/meta"};
    option (authorizer.common.v1.public) = true;
    option (authorizer.common.v1.mcp_tool) = {exposed: true};
  }
}

message GetMetaRequest {}

// GetMetaResponse mirrors the GraphQL Meta type 1:1. Field naming uses the
// existing snake_case names so existing consumers see the same shape over
// REST.
message GetMetaResponse {
  string version = 1;
  string client_id = 2;
  bool is_google_login_enabled = 3;
  bool is_facebook_login_enabled = 4;
  bool is_github_login_enabled = 5;
  bool is_linkedin_login_enabled = 6;
  bool is_apple_login_enabled = 7;
  bool is_discord_login_enabled = 8;
  bool is_twitter_login_enabled = 9;
  bool is_microsoft_login_enabled = 10;
  bool is_twitch_login_enabled = 11;
  bool is_roblox_login_enabled = 12;
  bool is_email_verification_enabled = 13;
  bool is_basic_authentication_enabled = 14;
  bool is_magic_link_login_enabled = 15;
  bool is_sign_up_enabled = 16;
  bool is_strong_password_enabled = 17;
  bool is_multi_factor_auth_enabled = 18;
  bool is_mobile_basic_authentication_enabled = 19;
  bool is_phone_verification_enabled = 20;
}
