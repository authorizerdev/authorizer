syntax = "proto3";

package authorizer.session.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "authorizer/common/v1/annotations.proto";
import "authorizer/session/v1/session.proto";

// SessionService manages user sessions. Creating a session is "login";
// deleting it is "logout"; reading the current session answers "am I
// authenticated, and as whom?".
service SessionService {
  // CreateSession authenticates a user and returns a new Session. The
  // request carries exactly one credential type via `oneof grant`. Browser
  // callers (REST) additionally receive Set-Cookie headers. The OAuth2
  // token endpoint at POST /oauth/token remains the spec-compliant
  // alternative for OAuth clients.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse) {
    option (google.api.http) = {
      post: "/v1/sessions"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
    option (authorizer.common.v1.audit_log) = true;
    option (authorizer.common.v1.mcp_tool) = {exposed: false};  // creds
  }

  // GetCurrentSession returns the session bound to the caller's cookie or
  // bearer token. Returns NOT_FOUND when unauthenticated.
  rpc GetCurrentSession(GetCurrentSessionRequest) returns (GetCurrentSessionResponse) {
    option (google.api.http) = {get: "/v1/sessions/me"};
    option (authorizer.common.v1.mcp_tool) = {exposed: true};
  }

  // DeleteSession ends the caller's current session. Always returns empty
  // on success, even if no session was active (idempotent).
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {
    option (google.api.http) = {delete: "/v1/sessions/me"};
    option (authorizer.common.v1.audit_log) = true;
  }

  // CreateSessionValidation validates a cookie/token held by a third party
  // — the typed equivalent of "is this session real?" used by backend
  // services validating tokens forwarded by an upstream proxy.
  rpc CreateSessionValidation(CreateSessionValidationRequest) returns (CreateSessionValidationResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/validations"
      body: "*"
    };
    option (authorizer.common.v1.public) = true;
  }
}

message CreateSessionRequest {
  oneof grant {
    PasswordGrant password = 1;
    OtpGrant otp = 2;
    MagicLinkGrant magic_link = 3;
    RefreshTokenGrant refresh_token = 4;
  }
  repeated string roles = 10;
  repeated string scope = 11;
  // OAuth2 authorization-code flow state echoed back via c_hash.
  string state = 12;
}

message PasswordGrant {
  // Exactly one of email / phone_number is required.
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string password = 3 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
}

message OtpGrant {
  string email = 1 [(buf.validate.field).string.max_len = 320];
  string phone_number = 2 [(buf.validate.field).string.max_len = 32];
  string otp = 3 [(buf.validate.field).string = {min_len: 1, max_len: 16}];
  bool is_totp = 4;
}

message MagicLinkGrant {
  // The token from the magic-link email URL.
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshTokenGrant {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message GetCurrentSessionRequest {
  // Optional permission filter: deny the request unless the caller holds
  // every (resource, scope) pair listed. Matches GraphQL
  // SessionQueryRequest.required_permissions.
  repeated PermissionRef required_permissions = 1;
  repeated string roles = 2;
  repeated string scope = 3;
  string state = 4;
}

message PermissionRef {
  string resource = 1 [(buf.validate.field).string.min_len = 1];
  string scope = 2 [(buf.validate.field).string.min_len = 1];
}

message CreateSessionResponse {
  Session session = 1;
}

message GetCurrentSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {}

message DeleteSessionResponse {}

message CreateSessionValidationRequest {
  // Cookie value (typically the fingerprint hash) to validate.
  string cookie = 1 [(buf.validate.field).string.min_len = 1];
  repeated string roles = 2;
  repeated PermissionRef required_permissions = 3;
}

message CreateSessionValidationResponse {
  SessionValidationResult result = 1;
}
